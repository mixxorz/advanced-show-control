name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  rust:
    name: Rust
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: nextest

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo nextest run --workspace

      - name: Build workspace
        run: cargo build --workspace

  frontend:
    name: Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Check UI formatting
        working-directory: ui
        run: npm run format:check

      - name: Lint UI
        working-directory: ui
        run: npm run lint

      - name: Typecheck UI
        working-directory: ui
        run: npm run typecheck

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Run UI unit tests
        working-directory: ui
        run: npm run test

      - name: Run Storybook tests
        working-directory: ui
        run: npm run test:storybook

  visual-changes:
    name: Visual change detection
    runs-on: ubuntu-latest
    outputs:
      visual: ${{ steps.filter.outputs.visual }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Detect visual-relevant changes
        id: filter
        uses: dorny/paths-filter@v4
        with:
          filters: |
            visual:
              - '.gitattributes'
              - '.nvmrc'
              - 'ui/.storybook/**'
              - 'ui/package.json'
              - 'ui/package-lock.json'
              - 'ui/playwright.config.ts'
              - 'ui/src/**'
              - 'ui/tests/visual/**'

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    needs: visual-changes
    if: github.event_name == 'workflow_dispatch' || needs.visual-changes.outputs.visual == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          lfs: true

      - name: Pull Git LFS files
        run: git lfs pull

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: |
            package-lock.json
            ui/package-lock.json

      - name: Install root dependencies
        run: npm ci

      - name: Install UI dependencies
        working-directory: ui
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: ui
        run: npx playwright install --with-deps chromium

      - name: Run visual tests
        working-directory: ui
        run: npm run test:visual

      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-artifacts
          path: |
            ui/test-results/
            ui/playwright-report/
          if-no-files-found: ignore
