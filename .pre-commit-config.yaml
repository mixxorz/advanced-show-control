repos:
  - repo: local
    hooks:
      - id: cargo-fmt
        name: cargo fmt
        entry: cargo fmt --all
        language: system
        pass_filenames: false
        types: [rust]

      - id: cargo-clippy
        name: cargo clippy
        entry: cargo clippy --workspace --all-targets -- -D warnings
        language: system
        pass_filenames: false
        types: [rust]

      - id: ui-prettier
        name: ui prettier
        entry: npm --prefix ui run format
        language: system
        pass_filenames: false
        files: ^ui/

      - id: ui-eslint
        name: ui eslint
        entry: npm --prefix ui run lint:fix
        language: system
        pass_filenames: false
        files: ^ui/
